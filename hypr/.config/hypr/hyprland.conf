####################
### FALLBACK MON ###
####################

# Per-host monitor definitions live in hosts/<hostname>.conf (sourced at EOF).
# This fallback handles any monitor not explicitly named there.
monitor=,preferred,auto,1


###################
### ENV / APPS ###
###################

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPR_WS_ROWS,A,B,C,D,E,F,G,H
env = HYPR_WS_COLS,10
env = HYPR_WS_PAIR_OFFSET,4
env = PATH,$HOME/.local/bin/scripts:$HOME/.local/bin:$PATH
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/ssh-agent.socket

$terminal = alacritty
$fileManager = nautilus
$launcher = qs ipc call launcher toggle
$powerMenu = qs ipc call session toggle


#################
### AUTOSTART ###
#################

exec-once = qs
exec-once = sshadd
exec-once = cliphist-watch
exec-once = systemctl --user start hyprpolkitagent
exec-once = udiskie &
exec-once = hypridle
exec-once = hypr-workspace-pair row 1



##########################
### LOOK AND BEHAVIOR  ###
##########################

general {
    gaps_in = 2
    gaps_out = 0
    border_size = 0
    resize_on_border = true
    extend_border_grab_area = 24
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    background_color = 0x000000
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    middle_click_paste = false
}

ecosystem {
    no_update_news = true
}

cursor {
    no_hardware_cursors = true
}

dwindle {
    force_split = 2
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    accel_profile = flat
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        tap_button_map = lrm
        tap-and-drag = true
        drag_lock = false
    }

    # Per-host: touchdevice / tablet output routing lives in hosts/<hostname>.conf.
}

# Per-host: device {} blocks for host-specific touchpads / touchscreens / tablets
# live in hosts/<hostname>.conf.

gestures {
    workspace_swipe_distance = 100
    workspace_swipe_invert = true
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Keep the default Hyprland bindings for now.
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, L, exec, $powerMenu
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, Q, togglefloating,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $launcher
# TODO(quickshell): port hypr-tag-window off rofi
# bind = $mainMod, Z, exec, hypr-tag-window
bind = ALT, Tab, exec, qs ipc call windows toggle
# TODO(quickshell): port passmenu off rofi
# bind = $mainMod ALT, P, exec, passmenu
# TODO(quickshell): port emojipicker off rofi+rofimoji
# bind = $mainMod, period, exec, emojipicker
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, V, exec, qs ipc call clipboard toggle
bind = $mainMod CTRL SHIFT ALT, V, exec, cliphist wipe

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, exec, hypr-workspace-pair goto 1
bind = $mainMod, 2, exec, hypr-workspace-pair goto 2
bind = $mainMod, 3, exec, hypr-workspace-pair goto 3
bind = $mainMod, 4, exec, hypr-workspace-pair goto 4
bind = $mainMod, 5, exec, hypr-workspace-pair goto 5
bind = $mainMod, 6, exec, hypr-workspace-pair goto 6
bind = $mainMod, 7, exec, hypr-workspace-pair goto 7
bind = $mainMod, 8, exec, hypr-workspace-pair goto 8
bind = $mainMod, 9, exec, hypr-workspace-pair goto 9
bind = $mainMod, 0, exec, hypr-workspace-pair goto 10

bind = $mainMod SHIFT, 1, exec, hypr-workspace-grid move 1
bind = $mainMod SHIFT, 2, exec, hypr-workspace-grid move 2
bind = $mainMod SHIFT, 3, exec, hypr-workspace-grid move 3
bind = $mainMod SHIFT, 4, exec, hypr-workspace-grid move 4
bind = $mainMod SHIFT, 5, exec, hypr-workspace-grid move 5
bind = $mainMod SHIFT, 6, exec, hypr-workspace-grid move 6
bind = $mainMod SHIFT, 7, exec, hypr-workspace-grid move 7
bind = $mainMod SHIFT, 8, exec, hypr-workspace-grid move 8
bind = $mainMod SHIFT, 9, exec, hypr-workspace-grid move 9
bind = $mainMod SHIFT, 0, exec, hypr-workspace-grid move 10

bind = $mainMod, Tab, submap, wsrows

submap = wsrows
bindi = , Tab, exec, hypr-workspace-pair cycle
bindi = , Tab, submap, reset
bindi = , 1, exec, hypr-workspace-pair row 1
bindi = , 1, submap, reset
bindi = , 2, exec, hypr-workspace-pair row 2
bindi = , 2, submap, reset
bindi = , 3, exec, hypr-workspace-pair row 3
bindi = , 3, submap, reset
bindi = , 4, exec, hypr-workspace-pair row 4
bindi = , 4, submap, reset
bindi = , escape, submap, reset
submap = reset

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Per-host: workspace -> monitor pinning lives in hosts/<hostname>.conf.

windowrule = suppress_event maximize, match:class .*


###################
### PER-HOST    ###
###################

# Sourced last so per-host monitors/workspaces/devices override or extend the
# shared core. Symlinked by `make` to hosts/<hostname>.conf.
source = ~/.config/hypr/host.conf
