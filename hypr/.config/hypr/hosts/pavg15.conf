# pavg15: HP Pavilion Gaming 15 — AMD iGPU (Ryzen 5 4600H) + GTX 1650
# Built-in eDP-1 1920x1080. Refresh assumed 60Hz; verify with `hyprctl monitors all`
# and bump to 144 if panel reports it.

################
### MONITORS ###
################

monitor=eDP-1,1920x1080@60,0x0,1
# Uncomment + adjust when external connected:
# monitor=HDMI-A-1,preferred,1920x0,1


##################
### WORKSPACES ###
##################

# Mirror sfx14 grid so muscle memory carries over.
# A-D -> eDP-1, E-H -> DP-1 (unreachable until external DP connected).
workspace = 1, monitor:eDP-1, defaultName:A1, default:true
